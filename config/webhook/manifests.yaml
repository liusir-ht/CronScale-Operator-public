---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-application-liuchong-cn-v1-cronscale
  failurePolicy: Fail
  name: mcronscale.kb.io
  rules:
  - apiGroups:
    - application.liuchong.cn
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - cronscales
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-application-liuchong-cn-v1-cronscale
  failurePolicy: Fail
  name: vcronscale.kb.io
  rules:
  - apiGroups:
    - application.liuchong.cn
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - cronscales
  sideEffects: None
